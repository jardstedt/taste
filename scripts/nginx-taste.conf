# Taste — Nginx reverse proxy config
# Replace YOURDOMAIN with your actual domain before use:
#   sed -i 's/YOURDOMAIN/yourdomain.com/g' /etc/nginx/sites-available/taste

# Rate limiting zone for API
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOURDOMAIN;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOURDOMAIN;

    # --- TLS (Let's Encrypt via Certbot) ---
    ssl_certificate /etc/letsencrypt/live/YOURDOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN/privkey.pem;

    # Strong TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # --- Security headers ---
    # Note: Most headers (CSP, HSTS, X-Content-Type-Options, Referrer-Policy)
    # are set by the Express Helmet middleware. Only add headers here that
    # Helmet doesn't cover.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Proxy settings ---
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Locations ---

    # API routes — rate limited
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3001;
    }

    # Socket.io — WebSocket upgrade
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Static assets — long cache
    location /assets/ {
        proxy_pass http://127.0.0.1:3001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # MCP Server — Streamable HTTP with SSE (x402 payment-gated)
    location /mcp/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # Let 402 payment responses pass through to client
        proxy_intercept_errors off;
    }

    # Everything else — SPA
    location / {
        proxy_pass http://127.0.0.1:3001;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }

    # Request size limit
    client_max_body_size 2m;
}
